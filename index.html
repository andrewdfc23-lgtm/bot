<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBot — Зарабатывай в зале</title>
    <style>
        body { font-family: Arial; background: #0a0a0a; color: white; margin:0; padding:20px; text-align:center; }
        h1 { color:#00ff9d; }
        .balance { font-size:32px; color:#00ff9d; margin:20px 0; }
        button { width:100%; padding:16px; margin:12px 0; font-size:18px; background:#00ff9d; color:black; border:none; border-radius:12px; }
    </style>
</head>
<body>
    <h1>FitBot</h1>
    <p>Занимайся — зарабатывай токены</p>
    
    <div class="balance">Баланс: <span id="balance">248</span> FIT</div>
    
    <button onclick="checkIn()">✅ Я в зале! Получить токены</button>
    <button onclick="alert('История чек-инов')">📍 История посещений</button>
    
    <script>
        function checkIn() {
            if (confirm("Отправить геопозицию чтобы подтвердить, что ты в зале?")) {
                alert("✅ Геопозиция принята!\n\nТы заработал 15 FIT токенов 🎉");
                let bal = parseInt(document.getElementById("balance").innerText);
                document.getElementById("balance").innerText = bal + 15;
            }
        }
    </script>
</body>
</html>
