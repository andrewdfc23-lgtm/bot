<!DOCTYPE html>
<html>
<head>
    <title>Gym Check</title>
</head>
<body>
    <h1>Проверка геолокации...</h1>

    <script>
        navigator.geolocation.getCurrentPosition((position) => {

            fetch("http://localhost:5000/check-location", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    user_id: Telegram.WebApp.initDataUnsafe.user.id
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "ok") {
                    document.body.innerHTML = "✅ Ты в зале! +10 токенов";
                } else {
                    document.body.innerHTML = "❌ Ты не в зале";
                }
            });

        });
    </script>
</body>
</html>
